<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Council</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">My Council</h1>
        <div class="persona" id="persona-name">Kratos</div>
      </header>

      <main class="chat" id="chat" aria-live="polite"></main>

      <form class="composer" id="composer">
        <textarea
          id="input"
          class="input"
          placeholder="Speak."
          rows="1"
          autocomplete="off"
        ></textarea>
        <button type="submit" class="send" id="send">Send</button>
      </form>
    </div>

    <script src="app.js"></script>
  </body>
</html>
