<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Council</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="avatar-container" id="avatar-container">
        <img id="avatar-image" src="" alt="Avatar" />
        <button type="button" class="chat-toggle-btn" id="chat-toggle" aria-label="Toggle chat panel">💬</button>
      </div>
      
      <div class="chat-container">
        <header class="header">
          <div class="header-top">
            <h1 class="title">My Council</h1>
            <button type="button" class="mute-btn" id="mute-toggle" aria-label="Mute voice playback">🔊</button>
          </div>
          <nav class="roster" id="roster" aria-label="Choose a persona"></nav>
        </header>

        <main class="chat" id="chat" aria-live="polite"></main>

        <div class="composer-tip" id="composer-tip">
          Type <span class="deep-trigger" id="deep-trigger">/deep</span> to query the cloud.
        </div>
        <form class="composer" id="composer">
          <button type="button" class="mic-btn" id="mic-btn" aria-label="Voice activation">🎤</button>
          <textarea
            id="input"
            class="input"
            placeholder="Speak."
            rows="1"
            autocomplete="off"
          ></textarea>
          <button type="submit" class="send" id="send">Send</button>
        </form>
      </div>
    </div>

    <script src="avatar.js"></script>
    <script src="voice.js"></script>
    <script src="mic.js"></script>
    <script src="app.js"></script>
  </body>
</html>
